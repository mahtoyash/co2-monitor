<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CO2 Monitor</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <h1>🌿 CO2 Monitor</h1>

  <select id="room-select">
    <option value="room1">Room 1</option>
    <option value="room2">Room 2</option>
    <option value="room3">Room 3</option>
  </select>

  <div id="live-data">
    <div class="card">
      <h3>CO2</h3>
      <p id="co2-value">-- ppm</p>
    </div>
    <div class="card">
      <h3>Temperature</h3>
      <p id="temp-value">-- °C</p>
    </div>
    <div class="card">
      <h3>Humidity</h3>
      <p id="hum-value">-- %</p>
    </div>
  </div>

  <div id="occupancy-section">
    <label>Occupancy: </label>
    <input type="number" id="occupancy-input" min="0" max="50" value="0"/>
    <button id="occupancy-btn">Update</button>
  </div>

  <div id="spike-alert" style="display:none;">
    CO2 Spike Detected!
  </div>

  <div id="predictions">
    <h2>Predictions</h2>
    <div class="card"><h3>+15 min</h3><p id="pred-15">-- ppm</p></div>
    <div class="card"><h3>+45 min</h3><p id="pred-45">-- ppm</p></div>
    <div class="card"><h3>+60 min</h3><p id="pred-60">-- ppm</p></div>
  </div>

  <canvas id="co2-chart"></canvas>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
